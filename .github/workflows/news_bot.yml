name: IT News Telegram Bot

on:
  schedule:
    # 매일 한국 시간 오전 9시 (UTC 00:00)에 실행
    - cron: '0 0 * * *'
  workflow_dispatch: # 필요할 때 GitHub 웹에서 수동으로 실행 가능

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        # 최신 Node.js 환경 지원을 위해 v4 사용
        uses: actions/checkout@v4

      - name: Set up Python
        # 최신 런타임 지원을 위해 v5 사용
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          # 캐싱을 활성화하면 매번 라이브러리를 새로 받지 않아 실행 속도가 빨라집니다.
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 필요한 라이브러리 직접 설치 (ModuleNotFoundError 방지)
          pip install feedparser requests google-generativeai

      - name: Run Scraper
        env:
          # GitHub Secrets에 등록한 변수들을 환경 변수로 매핑
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
